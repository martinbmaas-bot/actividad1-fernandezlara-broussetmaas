<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Contacto | Consultora Digital</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            background-color:#d8d6d2;
            font-family:Arial, Helvetica, sans-serif;
            color:#1f1f1f;
        }

        .page{
            width:90%;
            max-width:1300px;
            margin:40px auto;
            background-color:#f7f5f1;
            border-radius:45px;
            padding:40px;
        }

        header{
            margin-bottom:80px;
        }

        nav{
            display:flex;
            justify-content:space-between;
            align-items:center;
            gap:20px;
            flex-wrap:wrap;
        }

        .logo{
            font-size:14px;
            font-weight:bold;
            text-transform:uppercase;
            letter-spacing:1px;
        }

        .nav-links{
            display:flex;
            gap:25px;
            flex-wrap:wrap;
        }

        .nav-links a{
            text-decoration:none;
            color:#1f1f1f;
            font-size:14px;
            transition:0.3s;
        }

        .nav-links a:hover{
            opacity:0.6;
        }

        .contact-section{
            background-color:white;
            border-radius:35px;
            padding:90px 45px;
            text-align:center;
        }

        .contact-section h1{
            font-size:60px;
            margin-bottom:25px;
        }

        .contact-section p{
            max-width:750px;
            margin:auto;
            color:#666;
            line-height:1.8;
            font-size:18px;
            margin-bottom:45px;
        }

        .form{
            max-width:650px;
            margin:auto;
            display:flex;
            flex-direction:column;
            gap:20px;
        }

        input,
        textarea{
            width:100%;
            padding:18px;
            border:none;
            border-radius:18px;
            background-color:#f1efeb;
            font-size:15px;
            font-family:Arial, Helvetica, sans-serif;
        }

        textarea{
            height:150px;
            resize:none;
        }

        button{
            background-color:#1f1f1f;
            color:white;
            border:none;
            padding:16px;
            border-radius:35px;
            cursor:pointer;
            font-size:15px;
            transition:0.3s;
        }

        button:hover{
            opacity:0.8;
        }

        footer{
            border-top:1px solid #ddd;
            padding-top:25px;
            margin-top:70px;
            display:flex;
            justify-content:space-between;
            gap:20px;
            flex-wrap:wrap;
            color:#666;
            font-size:14px;
        }

        @media(max-width:768px){

            .contact-section h1{
                font-size:40px;
            }

            .page{
                padding:25px;
            }

            nav{
                justify-content:center;
                text-align:center;
            }

            .nav-links{
                justify-content:center;
            }

        }

    </style>

</head>

<body>

    <div class="page">

        <header>

            <nav>

                <div class="logo">
                    Consultora Digital
                </div>

                <div class="nav-links">
                    <a href="index.html">Inicio</a>
                    <a href="servicios.html">Servicios</a>
                    <a href="contacto.html">Contacto</a>
                </div>

            </nav>

        </header>

        <main>

            <section class="contact-section">

                <h1>
                    Contacto
                </h1>

                <p>
                    Si querés conocer más sobre nuestra consultora o iniciar un proyecto digital,
                    podés completar el siguiente formulario.
                </p>

                <form class="form">

                    <input type="text" placeholder="Nombre y apellido">

                    <input type="email" placeholder="Correo electrónico">

                    <textarea placeholder="Escribí tu mensaje"></textarea>

                    <button type="submit">
                        Enviar mensaje
                    </button>

                </form>

            </section>

        </main>

        <footer>

            <p>
                © 2026 Consultora Digital
            </p>

            <p>
                Diseño y Desarrollo Web — UADE
            </p>

        </footer>

    </div>

</body>

</html>
